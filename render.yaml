# ──────────────────────────────────────────────────────────────
#  Render Blueprint — LGTM full-stack deploy
#  Docs: https://render.com/docs/blueprint-spec
#
#  This file provisions:
#   1. lgtm-server  — Express + Socket.io backend (Docker)
#   2. lgtm-client  — Vite/React static frontend
#   3. lgtm-redis   — managed Redis (BullMQ queue store)
#
#  MongoDB is NOT provisioned by Render — use MongoDB Atlas
#  (free M0 tier) and paste the URI into MONGODB_URI below.
# ──────────────────────────────────────────────────────────────

services:
  # ── Managed Redis ──────────────────────────────────────────
  # BullMQ requires maxmemoryPolicy = noeviction
  - type: redis
    name: lgtm-redis
    region: singapore
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: [] # empty = only reachable from Render services

  # ── Backend (Docker) ───────────────────────────────────────
  - type: web
    name: lgtm-server
    runtime: docker
    rootDir: server
    region: singapore
    plan: starter # 512MB RAM — tree-sitter native bindings need this minimum
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # — wired automatically from the Redis service above —
      - key: REDIS_URL
        fromService:
          type: redis
          name: lgtm-redis
          property: connectionString
      # — set in the Render dashboard (sync:false hides them from the blueprint) —
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false # e.g. https://lgtm-client.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_APP_SLUG
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_DISABLED
        value: "false"
      - key: DODO_PAYMENTS_API_KEY
        sync: false
      - key: DODO_PRODUCT_ID
        sync: false
      - key: DODO_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SECURITY_MONITOR_ENABLED
        value: "true"

  # ── Frontend (static site) ────────────────────────────────
  - type: web
    name: lgtm-client
    runtime: static
    rootDir: client
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false # e.g. https://lgtm-server.onrender.com
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_DODO_ENV
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
